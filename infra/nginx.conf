worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # Сжатие
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
  gzip_min_length 1024;

  # Rate limiting (первый барьер; точный лимит — в приложении через Redis)
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

  upstream web      { server web:3000; }
  upstream realtime { server realtime:4000; }

  server {
    listen 80;
    server_name _;

    # Заголовки безопасности (defense in depth)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # HSTS включить после установки TLS:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 25m;

    # WebSocket — на realtime-сервис
    location /socket.io/ {
      proxy_pass http://realtime;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 300s;
    }

    # API — с rate-limit
    location /api/ {
      limit_req zone=api burst=40 nodelay;
      proxy_pass http://web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Иммутабельная статика Next — долгий кеш
    location /_next/static/ {
      proxy_pass http://web;
      proxy_cache_valid 200 1y;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Всё остальное — в Next
    location / {
      proxy_pass http://web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
